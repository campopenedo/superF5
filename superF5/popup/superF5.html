<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="superF5.css"> 
    <title>SuperF5</title>
</head>
<body>
    <header>
        <h1>SuperF5</h1>
        <p>When F5 is not enought</p>
    </header>
    <section id="simple-refresh">
        <p>Refresh every 
            <input type="number" id="quantity" name="quantity"> 
            seconds
        </p>
    </section>
    <section id="custom-refresh">
        <section id="seek-full-web">
            <label>
                <input type="checkbox" /> Stop refresing when the web changes
            </label>
        </section>
        <section id="seek-especific-content">
            <label>
                <input type="checkbox" /> Stop refresing when an specific part of the web changes
            </label>
        </section>
    </section>
    <label>
        <input type="checkbox" id="alarm" /> Set an alarm
    </label>
</body>
</html>
